// Category -> { icon (material symbol), bg, text }
const CAT_STYLE = {
  "Traslado":  { icon:"train",           bg:"bg-surface-variant",       text:"text-ink-subtle" },
  "Templo":    { icon:"temple_buddhist", bg:"bg-tertiary-fixed",        text:"text-on-tertiary-fixed" },
  "Santuario": { icon:"temple_buddhist", bg:"bg-tertiary-fixed",        text:"text-on-tertiary-fixed" },
  "Castillo":  { icon:"castle",          bg:"bg-surface-variant",       text:"text-ink-subtle" },
  "Comida":    { icon:"restaurant",      bg:"bg-secondary-fixed-dim",   text:"text-secondary" },
  "Foto":      { icon:"photo_camera",    bg:"bg-secondary-fixed",       text:"text-on-secondary-container" },
  "Recorrido": { icon:"location_on",     bg:"bg-primary",               text:"text-white" },
  "Naturaleza":{ icon:"park",            bg:"bg-nature-bg",             text:"text-nature-green" },
  "Actividad": { icon:"local_activity",  bg:"bg-secondary-container",   text:"text-on-secondary" },
  "Trámite":   { icon:"assignment",      bg:"bg-surface-variant",       text:"text-ink-subtle" },
};
function catStyle(cat){ return CAT_STYLE[cat] || { icon:"place", bg:"bg-surface-variant", text:"text-ink-subtle" }; }

let activeDay = dayData[0].key;

function renderHotels(){
  const wrap = document.getElementById('hotelScroll');
  const activeIso = DATES[activeDay] ? DATES[activeDay].iso : null;
  wrap.innerHTML = HOTELS.map(h => {
    const isActive = activeIso && activeIso >= h.checkin && activeIso < h.checkout;
    return `
    <div class="flex-shrink-0 w-64 bg-surface-container-lowest p-5 rounded-xl shadow-sm border border-outline-variant/20 ${isActive ? '' : 'opacity-50'}">
      <div class="flex items-start justify-between mb-2">
        <span class="font-label-caps text-label-caps text-secondary">${h.tag}</span>
        ${isActive ? '<span class="material-symbols-outlined text-secondary text-sm">verified</span>' : ''}
      </div>
      <h4 class="font-headline-md text-body-lg font-bold mb-1">${h.place} — ${h.name}</h4>
      <p class="font-body-md text-on-surface-variant text-sm">${h.label}</p>
    </div>`;
  }).join('');
}


function photoBento(d){
  const imgs = (d.photos || []).slice(0, 6).map((caption, i) => {
    const src = `images/${d.key}/${i+1}.jpg`;
    return { caption, src };
  });
  if (!imgs.length) return '';
  // layout pattern: first = wide (col-span-2), then pairs of squares, occasional wide every 4th
  let html = '';
  imgs.forEach((img, i) => {
    const wide = (i === 0) || (i % 4 === 3);
    html += `
      <div class="${wide ? 'col-span-2 aspect-[2/1]' : 'aspect-square'} rounded-xl overflow-hidden shadow-sm relative group">
        <img class="w-full h-full object-cover" src="${img.src}" alt="${img.caption}"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div style="display:none" class="w-full h-full items-center justify-center bg-surface-variant text-ink-subtle text-xs text-center p-2">${img.caption}</div>
        <span class="absolute bottom-1.5 left-2 text-[11px] text-white/90 font-label-caps drop-shadow">${img.caption}</span>
      </div>`;
  });
  return html;
}

function renderDay(){
  const d = dayData.find(x => x.key === activeDay);
  const wrap = document.getElementById('dayContent');

  const goshuinCount = d.poi.filter(p => p[1] === "Templo" || p[1] === "Santuario").length;
  const optionalCount = (d.optional || []).length;
  const goshuinBadge = (goshuinCount > 0 || optionalCount > 0) ? `
    <div class="bg-goshuin-bg p-4 rounded-xl border border-goshuin-gold/30 flex gap-3 items-center mt-4">
      <span class="material-symbols-outlined text-goshuin-gold" style="font-variation-settings:'FILL' 1;">info</span>
      <p class="font-body-md text-sm text-goshuin-gold font-bold">
        ${goshuinCount > 0 ? `Puedes conseguir ${goshuinCount} sello${goshuinCount>1?'s':''} goshuin hoy.` : ''}
        ${optionalCount > 0 ? `<span class="font-normal opacity-70"> + ${optionalCount} opcional${optionalCount>1?'es':''} si te da tiempo.</span>` : ''}
      </p>
    </div>` : '';

  const timeline = d.steps.map((step, i) => {
    const poiItem = d.poi[i];
    const cat = poiItem ? poiItem[1] : "Actividad";
    const style = catStyle(cat);
    const [name, ...descParts] = step[1].split(' — ');
    const desc = descParts.join(' — ');
    return `
    <div class="relative pl-10 pb-8 timeline-connector">
      <div class="absolute left-0 top-1 w-8 h-8 ${style.bg} rounded-full flex items-center justify-center z-10 border-2 border-surface-cream">
        <span class="material-symbols-outlined ${style.text} !text-base">${style.icon}</span>
      </div>
      <div class="bg-surface-container-lowest p-5 rounded-xl shadow-sm border border-outline-variant/10 hover:shadow-md transition-shadow">
        <div class="flex justify-between items-center mb-2">
          <span class="font-label-caps text-label-caps text-ink-subtle">${step[0]}</span>
          <span class="font-label-caps text-[10px] ${style.bg} px-2 py-0.5 rounded ${style.text}">${cat.toUpperCase()}</span>
        </div>
        <h4 class="font-headline-md text-body-lg font-bold mb-1">${name}</h4>
        ${desc ? `<p class="font-body-md text-on-surface-variant text-sm">${desc}</p>` : ''}
      </div>
    </div>`;
  }).join('');

  const optionalHtml = (d.optional && d.optional.length) ? `
    <div>
      <h3 class="font-headline-md text-headline-md text-primary mb-4 border-l-4 border-tertiary-fixed-dim pl-4">Templos opcionales — si te da tiempo</h3>
      <div class="grid grid-cols-1 gap-3">
        ${d.optional.map(([icon,name,desc,how]) => `
        <div class="bg-surface-container-lowest border border-dashed border-tertiary-fixed-dim rounded-xl p-4 flex gap-3">
          <div class="w-9 h-9 flex-none rounded-lg bg-tertiary-fixed flex items-center justify-center">
            <span class="material-symbols-outlined text-on-tertiary-fixed !text-lg">temple_buddhist</span>
          </div>
          <div>
            <h5 class="font-bold text-sm text-on-surface">${name}</h5>
            <p class="text-xs text-on-surface-variant mt-0.5">${desc}</p>
            <p class="text-[11px] text-secondary font-bold mt-1">📍 ${how}</p>
          </div>
        </div>`).join('')}
      </div>
    </div>` : '';

  const curiosHtml = (d.curiosities && d.curiosities.length) ? `
    <div>
      <h3 class="font-headline-md text-headline-md text-primary mb-4 border-l-4 border-secondary pl-4">¿Sabías que...?</h3>
      <div class="space-y-2">
        ${d.curiosities.map(([title, text]) => `
        <details class="bg-surface-container-lowest border border-outline-variant/15 rounded-xl overflow-hidden">
          <summary class="flex items-center justify-between gap-2 px-4 py-3 cursor-pointer hover:bg-surface-container">
            <span class="font-bold text-sm text-on-surface">${title}</span>
            <span class="material-symbols-outlined text-ink-subtle flex-none details-chevron !text-xl">expand_more</span>
          </summary>
          <p class="px-4 pb-4 text-sm text-on-surface-variant leading-relaxed">${text}</p>
        </details>`).join('')}
      </div>
    </div>` : '';

  wrap.innerHTML = `
    <section class="px-6 pt-8 pb-4">
      <p class="font-label-caps text-label-caps text-secondary mb-2">DÍA ${d.num} — ${(DATES[d.key]?.long || '').toUpperCase()}</p>
      <h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-1 italic">${d.title}</h2>
      <p class="text-xs text-on-surface-variant">${d.place}</p>
      ${goshuinBadge}
    </section>

    <div class="lg:grid lg:grid-cols-[5fr_3fr] lg:gap-8 lg:items-start lg:px-6 lg:pb-8">
      <div>
        <section class="px-6 lg:px-0 grid grid-cols-2 lg:grid-cols-3 gap-3 mb-6">
          ${photoBento(d)}
        </section>
        <section class="px-6 lg:px-0 pb-8">
          <h3 class="font-headline-md text-headline-md text-primary mb-6 border-l-4 border-secondary pl-4">Itinerario del día</h3>
          <div class="space-y-0">${timeline}</div>
        </section>
      </div>
      <div class="px-6 lg:px-0 pb-8 space-y-6 lg:sticky lg:top-4 lg:self-start lg:max-h-[calc(100vh-5rem)] lg:overflow-y-auto scroll-hide">
        ${optionalHtml}
        ${curiosHtml}
      </div>
    </div>
  `;
}

function renderBottomNav(){
  const idx = dayData.findIndex(d => d.key === activeDay);
  const d = dayData[idx];
  document.getElementById('bottomNavDay').textContent = `DÍA ${d.num}`;
  document.getElementById('bottomNavDate').textContent = DATES[d.key] ? DATES[d.key].short : '';
  const prevBtn = document.getElementById('prevDayBtn');
  const nextBtn = document.getElementById('nextDayBtn');
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === dayData.length - 1;
  prevBtn.onclick = () => { if (idx > 0) { activeDay = dayData[idx-1].key; render(); window.scrollTo({top:0,behavior:'smooth'}); } };
  nextBtn.onclick = () => { if (idx < dayData.length-1) { activeDay = dayData[idx+1].key; render(); window.scrollTo({top:0,behavior:'smooth'}); } };
}

function render(){
  renderHotels();
  renderDay();
  renderBottomNav();
}
render();
</script>
