function mapsRouteUrl(route){
  if (!route || route.length < 2) return '';
  const pts = [...route];
  const origin = pts.shift();
  const destination = pts.pop();
  const params = new URLSearchParams({ api:'1', travelmode:'transit', origin, destination });
  if (pts.length) params.set('waypoints', pts.join('|'));
  return `https://www.google.com/maps/dir/?${params.toString()}`;
}

let currentDayMap = null;
const geocodeCache = {};

async function geocodePlace(query){
  if (KNOWN_PLACES[query]) return KNOWN_PLACES[query];
  if (geocodeCache[query]) return geocodeCache[query];
  // Respaldo para cualquier lugar que no esté en KNOWN_PLACES (no debería
  // pasar con el itinerario actual, pero cubre nuevos lugares a futuro).
  const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json?limit=1&country=jp&proximity=139.6917,35.6895&access_token=${mapboxgl.accessToken}`;
  const res = await fetch(url);
  const data = await res.json();
  const coords = (data.features && data.features[0]) ? data.features[0].center : null;
  geocodeCache[query] = coords;
  return coords;
}

function dayMapMarkerEl(label, kind){
  const el = document.createElement('div');
  el.style.width = '26px';
  el.style.height = '26px';
  el.style.borderRadius = '50%';
  el.style.display = 'flex';
  el.style.alignItems = 'center';
  el.style.justifyContent = 'center';
  el.style.fontSize = '12px';
  el.style.fontWeight = 'bold';
  el.style.color = '#fff';
  el.style.border = '2px solid #fff';
  el.style.boxShadow = '0 1px 4px rgba(0,0,0,0.35)';
  el.style.background = kind === 'start' ? '#2a2521' : (kind === 'end' ? '#aa3529' : '#7e756f');
  el.style.cursor = 'pointer';
  if (kind === 'start') {
    el.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px">flag</span>';
  } else if (kind === 'end') {
    el.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px">location_on</span>';
  } else {
    el.textContent = label;
  }
  return el;
}

async function renderDayMap(d){
  if (currentDayMap) { currentDayMap.remove(); currentDayMap = null; }
  if (!d.route || d.route.length < 2) return;
  const requestedDay = d.key;

  try {
    const coords = await Promise.all(d.route.map(q => geocodePlace(q)));
    if (activeDay !== requestedDay) return;
    const stops = d.route
      .map((label, idx) => ({ label, coord: coords[idx] }))
      .filter(s => s.coord);
    if (stops.length < 2) return;

    const coordStr = stops.map(s => `${s.coord[0]},${s.coord[1]}`).join(';');
    const dirUrl = `https://api.mapbox.com/directions/v5/mapbox/driving/${coordStr}?geometries=geojson&overview=full&access_token=${mapboxgl.accessToken}`;
    const dirRes = await fetch(dirUrl);
    const dirData = await dirRes.json();
    if (activeDay !== requestedDay) return;
    const routeGeo = (dirData.routes && dirData.routes[0]) ? dirData.routes[0].geometry : null;

    const container = document.getElementById('dayMapContainer');
    if (!container) return;
    container.textContent = '';

    const map = new mapboxgl.Map({
      container,
      style: 'mapbox://styles/mapbox/light-v11',
      center: stops[0].coord,
      zoom: 10,
    });
    currentDayMap = map;
    map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), 'top-right');

    map.on('load', () => {
      if (routeGeo) {
        map.addSource('route', { type: 'geojson', data: { type: 'Feature', geometry: routeGeo, properties: {} } });
        map.addLayer({
          id: 'route-line-casing', type: 'line', source: 'route',
          layout: { 'line-cap': 'round', 'line-join': 'round' },
          paint: { 'line-color': '#ffffff', 'line-width': 7 },
        });
        map.addLayer({
          id: 'route-line', type: 'line', source: 'route',
          layout: { 'line-cap': 'round', 'line-join': 'round' },
          paint: { 'line-color': '#aa3529', 'line-width': 4 },
        });
      }

      const bounds = new mapboxgl.LngLatBounds();
      stops.forEach((s, i) => {
        const kind = i === 0 ? 'start' : (i === stops.length - 1 ? 'end' : 'stop');
        const el = dayMapMarkerEl(String(i + 1), kind);
        new mapboxgl.Marker({ element: el })
          .setLngLat(s.coord)
          .setPopup(new mapboxgl.Popup({ offset: 16 }).setText(s.label.split(',')[0]))
          .addTo(map);
        bounds.extend(s.coord);
      });
      map.fitBounds(bounds, { padding: 40, maxZoom: 13 });
    });
  } catch (err) {
    console.error('No se pudo cargar el mapa de Mapbox', err);
  }
}

function photoBento(d){
  const imgs = (d.photos || []).slice(0, 6).map((caption, i) => {
    const src = `images/${d.key}/${i+1}.jpg`;
    return { caption, src };
  });
  if (!imgs.length) return '';
  // layout pattern: first = wide (col-span-2), then pairs of squares, occasional wide every 4th
  let html = '';
  imgs.forEach((img, i) => {
    const wide = (i === 0) || (i % 4 === 3);
    html += `
      <div class="${wide ? 'col-span-2 aspect-[2/1]' : 'aspect-square'} rounded-xl overflow-hidden shadow-sm relative group">
        <img class="w-full h-full object-cover" src="${img.src}" alt="${img.caption}"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div style="display:none" class="w-full h-full items-center justify-center bg-surface-variant text-ink-subtle text-xs text-center p-2">${img.caption}</div>
        <span class="absolute bottom-1.5 left-2 text-[11px] text-white/90 font-label-caps drop-shadow">${img.caption}</span>
      </div>`;
  });
  return html;
}

      <p class="font-label-caps text-label-caps text-secondary mb-2">DÍA ${d.num} — ${(DATES[d.key]?.long || '').toUpperCase()}</p>
      <h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-1 italic">${d.title}</h2>
      <p class="text-xs text-on-surface-variant">${d.place}</p>
      ${goshuinBadge}
    </section>

    ${transportSummary(d)}

    ${mealSummary(d)}

    <section class="px-6 grid grid-cols-2 lg:grid-cols-3 gap-3 mb-6">
      ${photoBento(d)}
    </section>

    <section class="px-6">
      <h3 class="font-headline-md text-headline-md text-primary mb-6 border-l-4 border-secondary pl-4">Itinerario del día</h3>
      <div class="space-y-0 lg:max-w-2xl">${timeline}</div>
    </section>

    ${optionalHtml}
  `;
}

function renderBottomNav(){
  const idx = dayData.findIndex(d => d.key === activeDay);
  const d = dayData[idx];
  document.getElementById('bottomNavDay').textContent = `DÍA ${d.num}`;
  document.getElementById('bottomNavDate').textContent = DATES[d.key] ? DATES[d.key].short : '';
  const prevBtn = document.getElementById('prevDayBtn');
  const nextBtn = document.getElementById('nextDayBtn');
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === dayData.length - 1;
  prevBtn.onclick = () => { if (idx > 0) { activeDay = dayData[idx-1].key; render(); window.scrollTo({top:0,behavior:'smooth'}); } };
  nextBtn.onclick = () => { if (idx < dayData.length-1) { activeDay = dayData[idx+1].key; render(); window.scrollTo({top:0,behavior:'smooth'}); } };
}

function render(){
  renderHotels();
  renderDay();
  renderBottomNav();
  renderDayMap(dayData.find(x => x.key === activeDay));
}

async function initApp(){
  try {
    const res = await fetch('/api/config');
    const cfg = await res.json();
    mapboxgl.accessToken = cfg.mapboxToken || '';
  } catch (err) {
    console.error('No se pudo cargar la configuración de Mapbox', err);
  }
  render();
}
initApp();
</script>
</body>
</html>
